<section id="timer-section" class="timer-card" data-timer-root>
  <div class="ring" data-timer-ring style="--p:0">
    <div class="ring-inner">
      <div class="ring-time" data-timer-time>5:00</div>
      <div class="ring-label">focus</div>
    </div>
  </div>
  <button type="button" class="cta" onclick="startTimer(this)">Start 5 minutes</button>
  <div class="timer-status" data-timer-status>Ready when you are</div>
</section>
