<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Habit Maker{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12/dist/ext/json-enc.js"></script>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f7fb;
        --card: #ffffff;
        --border: #d9d9e3;
        --text: #1f2430;
        --muted: #656d78;
        --accent: #5b6cff;
      }

      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      header, main {
        width: min(1200px, calc(100% - 32px));
        margin: 0 auto;
      }

      header {
        padding: 24px 0 8px;
      }

      main {
        padding: 16px 0 40px;
        display: grid;
        gap: 16px;
      }

      .grid {
        display: grid;
        gap: 16px;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      }

      section, .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        box-shadow: 0 4px 18px rgba(18, 24, 40, 0.04);
      }

      section {
        padding: 16px;
      }

      h1, h2, h3 {
        margin: 0 0 12px;
      }

      p {
        margin: 0 0 10px;
        color: var(--muted);
      }

      form {
        display: grid;
        gap: 10px;
      }

      input, select, textarea, button {
        font: inherit;
      }

      input, select, textarea {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 12px;
        background: #fff;
        color: var(--text);
      }

      textarea {
        min-height: 92px;
        resize: vertical;
      }

      .actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 9px 14px;
        background: var(--accent);
        color: white;
        cursor: pointer;
      }

      button.secondary {
        background: #e9ecff;
        color: var(--accent);
      }

      button.danger {
        background: #ef4444;
      }

      button.delete {
        position: absolute;
        top: 6px;
        right: 6px;
        width: 15px;
        height: 15px;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.7rem;
        line-height: 1;
        background-color: #999797;
      }

      .item-list {
        display: grid;
        gap: 12px;
      }

      .item-card {
        position: relative;
        padding: 14px;
      }

      .meta {
        font-size: 0.9rem;
        color: var(--muted);
      }

      .calendar-days {
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      }

      .day-card {
        padding: 12px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: #fbfbfd;
      }

      .day-count {
        font-weight: 700;
        color: var(--accent);
      }

      .stack {
        display: grid;
        gap: 12px;
      }

      .nav {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin: 8px 0 20px;
      }

      .nav a {
        text-decoration: none;
      }

      .nav a.secondary {
        display: inline-flex;
        align-items: center;
        padding: 9px 14px;
        border-radius: 999px;
        background: #e9ecff;
        color: var(--accent);
      }
    </style>
    <script>
      function formatRemaining(seconds) {
        const minutes = Math.floor(seconds / 60);
        const secondsLeft = String(seconds % 60).padStart(2, '0');
        return `${minutes}:${secondsLeft}`;
      }

      async function startTimer(button) {
        const root = button.closest('[data-timer-root]');
        const habitInput = document.querySelector('#page1-habit-select');
        const habit = habitInput ? habitInput.value.trim() : '';
        const memoInput = document.querySelector('#page1-memo-input');
        const memo = memoInput ? memoInput.value.trim() : '';
        const status = root.querySelector('[data-timer-status]');
        const seconds = 300;

        if (!habit) {
          status.textContent = '習慣を入力してください。';
          return;
        }

        button.disabled = true;
        status.textContent = 'バックエンドで5分タイマーを開始しました。';

        try {
          const response = await fetch('/ui/timer/start', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Accept': 'application/json',
            },
            body: JSON.stringify({ habit, memo, duration_seconds: seconds }),
          });

          if (!response.ok) {
            throw new Error(await response.text());
          }

          const timer = await response.json();

          const poll = async () => {
            try {
              const latestResponse = await fetch(`/ui/timer/${encodeURIComponent(timer.timer_id)}`, {
                headers: { 'Accept': 'application/json' },
              });

              if (!latestResponse.ok) {
                throw new Error(await latestResponse.text());
              }

              const latest = await latestResponse.json();
              if (latest.status === 'running') {
                status.textContent = `残り ${formatRemaining(latest.remaining_seconds)}`;
                window.setTimeout(poll, 1000);
                return;
              }

              if (latest.status === 'completed') {
                status.textContent = '記録しました。';
                htmx.ajax('GET', '/ui/page1/memo', { target: '#page1-memo-section', swap: 'outerHTML' });
                button.disabled = false;
                return;
              }

              status.textContent = `記録に失敗しました。${latest.error || ''}`.trim();
              button.disabled = false;
            } catch (error) {
              status.textContent = 'タイマー状態を取得できませんでした。';
              button.disabled = false;
            }
          };

          poll();
        } catch (error) {
          status.textContent = 'タイマーを開始できませんでした。';
          button.disabled = false;
        }
      }
    </script>
  </head>
  <body>
    {% block body %}{% endblock %}
  </body>
</html>
