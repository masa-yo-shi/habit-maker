<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>{% block title %}Habit Maker{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12/dist/ext/json-enc.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        color-scheme: light;
        --bg: #eef0f8;
        --bg-2: #f7f5ff;
        --surface: #ffffff;
        --surface-2: #f6f7fc;
        --ink: #191b2e;
        --muted: #6e7388;
        --line: #e7e8f2;
        --accent: #6d5bff;
        --accent-2: #9b5bff;
        --accent-3: #ff6f91;
        --flame: #ff8a4c;
        --success: #1fcb9a;
        --grad: linear-gradient(135deg, #6d5bff 0%, #9b5bff 48%, #ff6f91 100%);
        --shadow: 0 18px 40px rgba(25, 27, 46, 0.10);
        --font-ui: "Plus Jakarta Sans", system-ui, -apple-system, "Segoe UI", sans-serif;
        --font-num: "Space Grotesk", "Plus Jakarta Sans", system-ui, sans-serif;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: var(--font-ui);
        color: var(--ink);
        background:
          radial-gradient(120% 60% at 50% -10%, var(--bg-2) 0%, rgba(247, 245, 255, 0) 60%),
          var(--bg);
        min-height: 100dvh;
        -webkit-font-smoothing: antialiased;
      }

      header, main {
        width: min(460px, calc(100% - 32px));
        margin: 0 auto;
      }

      header {
        padding: 24px 0 4px;
        display: flex;
        align-items: baseline;
        justify-content: space-between;
      }

      header h1 {
        margin: 0;
        font-family: var(--font-num);
        font-size: 1.45rem;
        font-weight: 700;
        letter-spacing: -0.02em;
      }

      header p {
        margin: 0;
        font-size: 0.82rem;
        color: var(--muted);
      }

      main {
        padding: 12px 0 110px;
        display: grid;
        gap: 14px;
      }

      .grid {
        display: grid;
        gap: 14px;
      }

      section, .card {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 22px;
        box-shadow: var(--shadow);
      }

      section { padding: 18px; }

      h1, h2, h3 {
        margin: 0 0 12px;
        letter-spacing: -0.01em;
      }

      h2 {
        font-size: 0.78rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
      }

      p { margin: 0 0 10px; color: var(--muted); }

      form { display: grid; gap: 12px; }

      label {
        display: grid;
        gap: 6px;
        font-size: 0.82rem;
        font-weight: 600;
        color: var(--muted);
      }

      input, select, textarea, button { font: inherit; }

      input, select, textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 13px 14px;
        background: var(--surface-2);
        color: var(--ink);
        font-weight: 500;
        transition: border-color 0.15s, box-shadow 0.15s;
      }

      input:focus, select:focus, textarea:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 4px rgba(109, 91, 255, 0.14);
      }

      textarea { min-height: 96px; resize: vertical; }

      .actions { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }

      button {
        border: 0;
        border-radius: 999px;
        padding: 13px 18px;
        background: var(--accent);
        color: #fff;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.12s ease, box-shadow 0.2s, filter 0.15s;
      }

      button:active { transform: scale(0.97); }
      button:focus-visible { outline: 3px solid rgba(109, 91, 255, 0.4); outline-offset: 2px; }

      /* The single, obvious call to action */
      .cta {
        width: 100%;
        padding: 16px;
        font-size: 1.02rem;
        font-weight: 700;
        background: var(--grad);
        box-shadow: 0 12px 26px rgba(109, 91, 255, 0.34);
      }
      .cta:hover { filter: brightness(1.04); }
      .cta:disabled { filter: grayscale(0.4) brightness(0.98); box-shadow: none; cursor: default; }

      button.secondary { background: #ecebff; color: var(--accent); }
      button.danger { background: #ffe9ee; color: #e23d6b; }

      /* ---- Timer: the signature 5-minute ring ---- */
      .timer-card {
        display: grid;
        justify-items: center;
        gap: 18px;
        padding: 24px 18px;
        text-align: center;
        background:
          radial-gradient(120% 80% at 50% 0%, rgba(155, 91, 255, 0.08), transparent 70%),
          var(--surface);
      }

      .ring {
        --p: 0;
        position: relative;
        width: 232px;
        height: 232px;
        border-radius: 50%;
        background: conic-gradient(from 0deg, var(--accent) 0%, var(--accent-2) calc(var(--p) * 0.6%), var(--accent-3) calc(var(--p) * 1%), var(--line) 0);
        display: grid;
        place-items: center;
        transition: filter 0.3s;
      }

      .ring.running { animation: ringGlow 2.4s ease-in-out infinite; }

      @keyframes ringGlow {
        0%, 100% { filter: drop-shadow(0 0 0 rgba(155, 91, 255, 0)); }
        50% { filter: drop-shadow(0 8px 24px rgba(155, 91, 255, 0.4)); }
      }

      .ring-inner {
        position: absolute;
        inset: 16px;
        border-radius: 50%;
        background: var(--surface);
        display: grid;
        place-items: center;
        gap: 2px;
        box-shadow: inset 0 2px 10px rgba(25, 27, 46, 0.05);
      }

      .ring-time {
        font-family: var(--font-num);
        font-size: 3rem;
        font-weight: 600;
        letter-spacing: -0.02em;
        line-height: 1;
        font-variant-numeric: tabular-nums;
      }

      .ring-label {
        font-size: 0.72rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--muted);
      }

      .timer-status { font-size: 0.85rem; font-weight: 600; color: var(--muted); min-height: 1.1em; }

      /* ---- Streak chip ---- */
      .streak {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 12px;
        border-radius: 999px;
        background: #fff1e8;
        color: var(--flame);
        font-weight: 700;
        font-size: 0.86rem;
      }

      /* ---- Modal ---- */
      .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(25, 27, 46, 0.5);
        backdrop-filter: blur(3px);
        z-index: 1100;
        align-items: flex-end;
        justify-content: center;
        padding: 0;
      }
      .modal-overlay.open { display: flex; animation: fadeIn 0.18s ease; }

      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      @keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

      .modal {
        position: relative;
        background: var(--surface);
        border-radius: 26px 26px 0 0;
        padding: 22px 20px calc(22px + env(safe-area-inset-bottom));
        width: min(460px, 100%);
        box-shadow: 0 -10px 40px rgba(25, 27, 46, 0.22);
        animation: sheetUp 0.24s cubic-bezier(0.2, 0.8, 0.2, 1);
      }

      .modal-close {
        position: absolute;
        top: 14px;
        right: 16px;
        width: 32px;
        height: 32px;
        padding: 0;
        border-radius: 999px;
        background: var(--surface-2);
        color: var(--muted);
        font-size: 18px;
        line-height: 1;
      }

      /* ---- Lists / cards used elsewhere ---- */
      .item-list { display: grid; gap: 12px; }
      .item-card { position: relative; padding: 16px; border-radius: 18px; }
      .meta { font-size: 0.86rem; color: var(--muted); }

      button.delete {
        position: absolute;
        top: 8px;
        right: 8px;
        width: 22px;
        height: 22px;
        padding: 0;
        display: grid;
        place-items: center;
        font-size: 0.72rem;
        background: var(--surface-2);
        color: var(--muted);
      }

      .calendar-days {
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      }
      .day-card { padding: 14px; border: 1px solid var(--line); border-radius: 16px; background: var(--surface-2); }
      .day-count { font-family: var(--font-num); font-weight: 700; color: var(--accent); }

      .stack { display: grid; gap: 14px; }

      /* ---- Bottom tab bar (single-thumb nav) ---- */
      .tabbar {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 1000;
        display: flex;
        justify-content: space-around;
        gap: 4px;
        padding: 8px 14px calc(8px + env(safe-area-inset-bottom));
        background: rgba(255, 255, 255, 0.82);
        backdrop-filter: saturate(1.4) blur(14px);
        border-top: 1px solid var(--line);
      }

      .tabbar form { margin: 0; }

      .tab {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 3px;
        padding: 6px 4px;
        background: transparent;
        border: 0;
        border-radius: 14px;
        color: var(--muted);
        font-size: 0.66rem;
        font-weight: 600;
        text-decoration: none;
        cursor: pointer;
        transition: color 0.15s;
      }

      .tab svg { width: 23px; height: 23px; }
      .tab[aria-current="page"] { color: var(--accent); }

      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after { animation: none !important; transition: none !important; }
      }
    </style>
    <script>
      function formatRemaining(seconds) {
        const minutes = Math.floor(seconds / 60);
        const secondsLeft = String(seconds % 60).padStart(2, '0');
        return `${minutes}:${secondsLeft}`;
      }

      async function startTimer(button) {
        const root = button.closest('[data-timer-root]');
        const habitInput = document.querySelector('#page1-habit-select');
        const habitValue = habitInput ? habitInput.value.trim() : '';
        const habit = habitValue === '__new__' ? '' : habitValue;
        const memoInput = document.querySelector('#page1-memo-input');
        const memo = memoInput ? memoInput.value.trim() : '';
        const status = root.querySelector('[data-timer-status]');
        const timeEl = root.querySelector('[data-timer-time]');
        const ring = root.querySelector('[data-timer-ring]');
        const total = 300;
        const setRing = (remaining) => {
          if (ring) {
            const pct = Math.max(0, Math.min(100, ((total - remaining) / total) * 100));
            ring.style.setProperty('--p', String(pct));
          }
        };

        if (!habit) {
          status.textContent = 'Pick a habit first';
          return;
        }

        button.disabled = true;
        if (ring) ring.classList.add('running');
        status.textContent = 'Focusing…';
        if (timeEl) timeEl.textContent = formatRemaining(total);
        setRing(total);

        const finish = (message) => {
          if (ring) ring.classList.remove('running');
          status.textContent = message;
          button.disabled = false;
        };

        try {
          const response = await fetch('/ui/timer/start', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Accept': 'application/json',
            },
            body: JSON.stringify({ habit, memo, duration_seconds: total }),
          });

          if (!response.ok) {
            throw new Error(await response.text());
          }

          const timer = await response.json();

          const poll = async () => {
            try {
              const latestResponse = await fetch(`/ui/timer/${encodeURIComponent(timer.timer_id)}`, {
                headers: { 'Accept': 'application/json' },
              });

              if (!latestResponse.ok) {
                throw new Error(await latestResponse.text());
              }

              const latest = await latestResponse.json();
              if (latest.status === 'running') {
                if (timeEl) timeEl.textContent = formatRemaining(latest.remaining_seconds);
                setRing(latest.remaining_seconds);
                status.textContent = 'Keep going';
                window.setTimeout(poll, 1000);
                return;
              }

              if (latest.status === 'completed') {
                if (timeEl) timeEl.textContent = '0:00';
                setRing(0);
                finish('Done · saved');
                htmx.ajax('GET', '/ui/page1/memo', { target: '#page1-memo-section', swap: 'outerHTML' });
                return;
              }

              finish(`Couldn't save${latest.error ? ' · ' + latest.error : ''}`);
            } catch (error) {
              finish("Couldn't reach the timer");
            }
          };

          poll();
        } catch (error) {
          finish("Couldn't start the timer");
        }
      }
    </script>
  </head>
  <body>
    {% block body %}{% endblock %}

    <nav class="tabbar">
      <a href="/" class="tab" data-path="/" title="Today" aria-label="Today">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
        Today
      </a>
      <a href="/page2" class="tab" data-path="/page2" title="Calendar" aria-label="Calendar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="17" rx="3"/><path d="M3 9h18M8 2v4M16 2v4"/></svg>
        Calendar
      </a>
      <form method="post" action="/logout">
        <button type="submit" class="tab" title="Log out" aria-label="Log out">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
          Log out
        </button>
      </form>
    </nav>

    <script>
      (function () {
        const path = location.pathname;
        document.querySelectorAll('.tab[data-path]').forEach((tab) => {
          if (tab.dataset.path === path) tab.setAttribute('aria-current', 'page');
        });
      })();
    </script>
  </body>
</html>
